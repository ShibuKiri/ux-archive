<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#F7F7F5" />
  <title>404 — UX Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#F7F7F5;--text:#161616;--secondary:#72706B;--divider:#E5E4DF;--brand:#245C73}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text)}
    body{font-family:'Hanken Grotesk',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased}
    .wrap{max-width:760px;min-height:100vh;margin:0 auto;padding:56px 24px 48px;display:flex;flex-direction:column}
    .mono{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;line-height:16px;letter-spacing:.02em}
    .brand{color:var(--text);text-decoration:none}.error{margin:auto 0;padding:96px 0}.code{color:var(--secondary);margin-bottom:24px}
    h1{font-size:48px;line-height:56px;letter-spacing:-.035em;font-weight:600;margin:0}.lead{font-size:20px;line-height:30px;color:var(--secondary);max-width:520px;margin:20px 0 0}
    .back{display:inline-flex;align-items:center;gap:10px;margin-top:40px;color:var(--brand);text-decoration:none;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;line-height:16px;letter-spacing:.06em;text-transform:uppercase;background:none;border:0;padding:0;cursor:pointer}.back-arrow{transition:transform .15s ease}.back:hover .back-arrow{transform:translateX(-4px)}
    footer{padding-top:24px;border-top:1px solid var(--divider);display:flex;justify-content:space-between;gap:24px;color:var(--secondary)}
    button:focus-visible,a:focus-visible{outline:2px solid var(--brand);outline-offset:4px}
    @media(max-width:640px){.wrap{padding:32px 20px}.error{padding:72px 0}h1{font-size:36px;line-height:44px}.lead{font-size:18px;line-height:28px}footer{flex-direction:column}}
    @media(prefers-reduced-motion:reduce){.back-arrow{transition:none}}
  </style>
</head>
<body>
  <div class="wrap">
    <header><a class="mono brand" href="/ux-archive/">UX Archive</a></header>
    <main class="error">
      <div class="mono code">Error 404</div>
      <h1>Page not found.</h1>
      <p class="lead">The page you're looking for doesn't exist or hasn't been published yet.</p>
      <button class="back" type="button" onclick="goBack()"><span class="back-arrow">←</span> Go back</button>
    </main>
    <footer><div class="mono">Independent UX Archive</div><div class="mono">© 2026 ShibuKiri</div></footer>
  </div>
  <script>
    function goBack(){
      if(document.referrer && new URL(document.referrer).origin === window.location.origin){
        history.back();
      }else{
        window.location.href='/ux-archive/';
      }
    }
  </script>
</body>
</html>
