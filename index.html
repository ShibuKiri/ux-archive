<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UX Archive — by ShibuKiri</title>
    <style>
        :root {
            --bg: #F7F7F5;
            --surface: #FFFFFF;
            --text: #161616;
            --text-secondary: #72706B;
            --divider: #E5E4DF;
            --brand: #245C73;
            --brand-tint: #EEF4F7;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 2rem;
            max-width: 960px;
            margin: 0 auto;
        }
        header {
            margin-bottom: 3rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--divider);
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            color: var(--brand);
        }
        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-top: 0.25rem;
            font-family: 'IBM Plex Mono', monospace;
        }
        .review-list {
            list-style: none;
        }
        .review-item {
            background: var(--surface);
            border: 1px solid var(--divider);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: border-color 0.2s;
        }
        .review-item:hover { border-color: var(--brand); }
        .review-item h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .review-item h2 a {
            color: var(--brand);
            text-decoration: none;
        }
        .review-item h2 a:hover { text-decoration: underline; }
        .review-item p {
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        .tag {
            display: inline-block;
            background: var(--brand-tint);
            color: var(--brand);
            font-size: 0.8rem;
            font-weight: 500;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            margin-right: 0.5rem;
            font-family: 'IBM Plex Mono', monospace;
        }
        .empty {
            color: var(--text-secondary);
            font-style: italic;
            margin-top: 2rem;
        }
        footer {
            margin-top: 3rem;
            padding-top: 1rem;
            border-top: 1px solid var(--divider);
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>UX Archive</h1>
        <p class="subtitle">by ShibuKiri · Public reviews & audits</p>
    </header>

    <ul class="review-list">
        <!-- Список ревью будет обновляться вручную -->
        <li class="review-item">
            <h2><a href="/ux-archive/reviews/001-zama/">Zama — Homepage UX Review</a></h2>
            <p>Enterprise-focused review of the main landing page. Identifies critical clarity and trust issues for institutional users.</p>
            <span class="tag">Enterprise</span>
            <span class="tag">Homepage</span>
        </li>
        <!-- Добавляй новые элементы по мере создания новых ревью -->
    </ul>

    <!-- Если ревью ещё нет, показывается это сообщение -->
    <!-- <p class="empty">No reviews published yet. Check back soon.</p> -->

    <footer>
        <p>© 2026 ShibuKiri · Built with GitHub Pages</p>
    </footer>
</body>
</html>
