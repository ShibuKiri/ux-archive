<style>
:root{--bg:#F7F7F5;--text:#161616;--secondary:#72706B;--divider:#E5E4DF;--brand:#245C73;--gutter:24px}
*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--text)}body{font-family:'Hanken Grotesk',sans-serif;font-size:16px;line-height:24px;-webkit-font-smoothing:antialiased}
